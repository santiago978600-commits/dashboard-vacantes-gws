name: GWS Recruitment Dashboard Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write        # Permite git push
  pages: write           # Permite publicar en GitHub Pages
  id-token: write        # Requerido por Pages

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Download Excel from SharePoint
        run: |
          set -euo pipefail
          mkdir -p data
          URL="https://juanciudad-my.sharepoint.com/:x:/g/personal/ferney_pinzon_mederi_com_co/IQDbSIaMgu_TQ6Sg5ONBno2hAeVKjCUF_wmZnB5u0eR2Qr8?e=MP4c8Y&download=1"
          curl --fail --location --silent --show-error "$URL" -o data/dashboard.xlsx
          FILE_TYPE=$(file --brief --mime-type data/dashboard.xlsx)
          echo "MIME detectado: $FILE_TYPE"
          case "$FILE_TYPE" in
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet) echo "✅ XLSX válido";;
            application/zip) echo "✅ XLSX detectado como zip (OK)";;
            *) echo "❌ ERROR: SharePoint devolvió HTML en vez de Excel. Revisa permisos del enlace." >&2; exit 1;;
          esac

      - name: Generate Dashboard
        run: python3 scripts/generate.py data/dashboard.xlsx

      - name: Commit updated dashboard
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "chore: automated dashboard update" || echo "No changes to commit"
          git push

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .     # Publica todo, incluido index.html

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        uses: actions/deploy-pages@v4
